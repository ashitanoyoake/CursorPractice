<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Illustration Portfolio | お問い合わせ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="site-header">
    <a href="index.html" class="site-logo">
      <div class="placeholder logo-placeholder">ロゴ予定</div>
      <span>Illustration Portfolio</span>
    </a>
    <nav>
      <ul>
        <li><a href="index.html">ホーム</a></li>
        <li><a href="profile.html">プロフィール</a></li>
        <li><a href="instagram.html">Instagram作品</a></li>
        <li><a href="works.html">お仕事履歴</a></li>
        <li><a href="blog.html">ブログ</a></li>
        <li><a href="contact.html" class="nav-current">お問い合わせ</a></li>
      </ul>
    </nav>
  </div>

  <main class="section-narrow page-main">
    <h1 class="page-title">お問い合わせ</h1>
    <p class="section-lead">イラストのご依頼・ご相談はお気軽にどうぞ。</p>

    <form class="contact-form" action="#" method="post">
      <p>
        <label for="name">お名前</label>
        <input type="text" id="name" name="name">
      </p>
      <p>
        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email">
      </p>
      <p>
        <label for="message">メッセージ</label>
        <textarea id="message" name="message" rows="4"></textarea>
      </p>
      <p>
        <button type="submit">送信</button>
      </p>
    </form>
  </main>

  <footer>
    <p>© 2026 Illustration Portfolio</p>
  </footer>

</body>
</html>
