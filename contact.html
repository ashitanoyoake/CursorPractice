<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | おつまみ日記！</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="site-logo">
      <div class="placeholder logo-placeholder">ロゴ予定</div>
      <span>おつまみ日記！</span>
    </a>
    <nav aria-label="メインナビゲーション">
      <ul>
        <li><a href="index.html">ホーム</a></li>
        <li><a href="instagram.html">Instagram</a></li>
        <li><a href="works.html">お仕事</a></li>
        <li><a href="blog.html">ブログ</a></li>
        <li><a href="contact.html" class="nav-current">お問い合わせ</a></li>
      </ul>
    </nav>
  </header>

  <main class="content-inner page-main">
        <header class="page-header">
          <div class="page-deco">
            <div class="placeholder deco-placeholder">イラスト予定</div>
          </div>
          <h1 class="page-title">お問い合わせ</h1>
          <p class="page-lead">イラストのご依頼・ご相談はお気軽にどうぞ。</p>
        </header>
        <form class="contact-form" action="#" method="post">
          <p>
            <label for="name">お名前</label>
            <input type="text" id="name" name="name">
          </p>
          <p>
            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="email">
          </p>
          <p>
            <label for="message">メッセージ</label>
            <textarea id="message" name="message" rows="4"></textarea>
          </p>
          <p>
            <button type="submit">送信</button>
          </p>
        </form>
  </main>

  <footer class="site-footer">
    <p class="footer-site-name">おつまみ日記！</p>
    <p class="footer-copy">© 2026 おつまみ日記！</p>
  </footer>

</body>
</html>
